name: Petalytics CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Build & Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./petalytics-backend
        
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Run Maven Tests (with Testcontainers)
        run: ./mvnw clean verify
        
  frontend-build:
    name: Frontend Build (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./petalytics-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ./petalytics-frontend/package-lock.json

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build