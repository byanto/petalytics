services:
  postgres:
    image: postgres:18-alpine
    container_name: petalytics-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: petalytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - petalytics-db-data:/var/lib/postgresql/data

volumes:
  petalytics-db-data: